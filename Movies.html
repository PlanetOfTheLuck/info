    <script>

        let isTableEmpty = true;

        // ######################################################################################################################## ⚠️ Ноут
        function uploadCSV() {
            const fileInput = document.getElementById('uploadFile');
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function (event) {
                const csvData = event.target.result;
                processCSV(csvData);
                updateIndicator();

                isTableEmpty = false;

                fileInput.value = ''; // Очищаємо значення fileInput для того, щоб дозволити завантаження того ж файлу повторно
            };
            reader.readAsText(file);
        }

        // ######################################################################################################################## ⚠️ Твіч
        function loadCSV() { 
            fetch("data/Movies.csv") // Шлях до CSV у репо
                .then(response => {
                    if (!response.ok) throw new Error("Файл не знайдено");
                    return response.text();
                })
                .then(csvData => {
                    processCSV(csvData);  // викликаємо стару функцію
                    isTableEmpty = watchList.length === 0 && watchedList.length === 0;
                    updateIndicator();
                })
                .catch(error => console.error("Помилка завантаження CSV:", error));
        }

        function processCSV(csvData) {
            const lines = csvData.split("\n").slice(1); // Видаляємо перший рядок із заголовками
            watchList = [];
            watchedList = [];

            lines.forEach(line => {
                if (line.trim() !== "") {
                    const [index, date, movie, year, nick, genre, rating, list] = line.split(";");
                    const entry = { date, movie, year, nick, genre, rating };

                    if (list.trim() === 'Переглянути') {
                        watchList.push(entry);
                    } else if (list.trim() === 'Переглянуто') {
                        watchedList.push(entry);
                    }
                }
            });

            showWatchList();
            showWatchedList();
            isTableEmpty = watchList.length === 0 && watchedList.length === 0;

            updateIndicator();
        }

        function downloadCSV() {
            const watchListContent = watchList.map((item, index) => [index + 1, item.date, item.movie, item.year, item.nick, item.genre, item.rating, 'Переглянути']);
            const watchedListContent = watchedList.map((item, index) => [index + 1, item.date, item.movie, item.year, item.nick, item.genre, item.rating, 'Переглянуто']);

            const csvContent = [
                ["№", "Дата", "Фільм", "Рік", "Нік", "Жанр", "10", "Список"],
                ...watchListContent,
                ...watchedListContent
            ].map(e => e.join(";")).join("\n");

            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });

            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "movies.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            clearTables();
        }



        document.getElementById('uploadFile').addEventListener('change', uploadCSV);

        function focusTitleField() {
            document.getElementById('addMoveTitle').focus();
        }


        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('addMoveTitle').focus();
            showWatchList();
            showWatchedList();
        });

        document.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();

            if (event.ctrlKey && event.shiftKey && (key === 's' || key === 'і')) {
                event.preventDefault();
                downloadCSV();
            }

            if (event.key === 'Escape') {
                document.getElementById('watch-list-section').style.display = 'none';
                document.getElementById('watched-list-section').style.display = 'none';
                document.getElementById('search-results-section').style.display = 'none';
            }

            if (event.key === 'Enter') {
                const movie = document.getElementById('addMoveTitle').value;
                const year = document.getElementById('addMoveYear').value;

                if (movie && year) {
                    addMovie();
                } else {
                    alert('Ало! А назва фільма та рік?');
                }

                document.getElementById('addMoveTitle').focus();
            }
        });

        //    if (!isTableEmpty) {

        // ######################################################################################################################## ⚠️ Твіч
        window.onload = function () {       // Автозавантаження файлу
            loadCSV();
        };



        function updateIndicator() {
            const indicator = document.getElementById('indicator');
            const hasData = watchList.length > 0 || watchedList.length > 0;

            if (hasData) {
                indicator.classList.remove('indicator-green');
                indicator.classList.add('indicator-red');
            } else {
                indicator.classList.remove('indicator-red');
                indicator.classList.add('indicator-green');
            }
        }



        function addMovie() {
            const fileInput = document.getElementById('uploadFile');
            const indicator = document.getElementById('indicator');

            const movie = document.getElementById('addMoveTitle').value;
            const year = document.getElementById('addMoveYear').value;
            const nick = document.getElementById('addMoveNick').value;
            const date = new Date().toLocaleDateString();

            if (isTableEmpty) {
                //alert('Ало! А файл фільмів?');
                fileInput.click();
                return;
            }

            if (movie && year) {
                watchList.push({ movie, year, nick, date });
                clearInputs();
                showWatchList();

                // Відкриваємо список "Переглянути" без закриття інших секцій
                document.getElementById('watch-list-section').style.display = 'block';
                scrollToLastRow('watch-list');

                document.getElementById('addMoveTitle').focus();
            } else {
                alert('Ало! А назва фільма та рік?');
            }

            updateIndicator();
            isTableEmpty = false;
        }



        function editMovie(listName, index, field, value) {
            if (listName === 'watchList') {
                watchList[index][field] = value;
            } else {
                watchedList[index][field] = value;
            }
        }



        function deleteFromList(listName, index, fromSearch = false) {
            if (confirm('Ало!!! видаляємо шолі?')) {
                if (listName === 'watchList') {
                    watchList.splice(index, 1);
                    showWatchList();
                } else {
                    watchedList.splice(index, 1);
                    showWatchedList(false);
                }

                if (fromSearch) {
                    updateSearchResults(false);
                }

                updateIndicator();
                isTableEmpty = watchList.length === 0 && watchedList.length === 0;
            }
        }



        function markAsWatched(index, fromSearch = false) {
            const movie = watchList.splice(index, 1)[0];
            movie.date = new Date().toLocaleDateString();
            watchedList.push(movie);

            showWatchedList();
            document.getElementById('watched-list-section').style.display = 'block';
            scrollToLastRow('watched-list');

            showWatchList();

            // Якщо виклик здійснено з пошуку, оновлюємо результати пошуку
            if (fromSearch) {
                updateSearchResults();
            }
        }



        function toggleSection(sectionId, scrollToBottom = false, isClosing = false) {
            const section = document.getElementById(sectionId);
            const isVisible = section.style.display === 'block';

            if (isClosing) {
                section.style.display = 'none';
            } else {
                section.style.display = isVisible ? 'none' : 'block';
                if (scrollToBottom && !isClosing) {
                    scrollToLastRow(sectionId);
                }
            }

            if (sectionId === 'watched-list-section' && !isClosing) {
                showWatchedList()
            }
        }



        function searchMovies() {
            const query = document.getElementById('search').value.toLowerCase();
            if (query === '') {
                closeSearchResults();
            } else {
                updateSearchResults();
            }
        }



        function scrollToLastRow(tableId) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            const lastRow = tbody.lastElementChild;
            if (lastRow) {
                lastRow.scrollIntoView({ behavior: 'smooth' });
            }
        }



        function sortTable(tableId, columnIndex) {
            const table = document.getElementById(tableId);
            const rows = Array.from(table.querySelector('tbody').rows);
            const isAscending = table.dataset.sortOrder === 'asc';

            rows.sort((a, b) => {
                const aText = a.cells[columnIndex].querySelector('input')?.value || a.cells[columnIndex].innerText;
                const bText = b.cells[columnIndex].querySelector('input')?.value || a.cells[columnIndex].innerText;

                const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });
                return isAscending ? collator.compare(aText, bText) : collator.compare(bText, aText);
            });

            table.dataset.sortOrder = isAscending ? 'desc' : 'asc';

            const tbody = table.querySelector('tbody');
            tbody.innerHTML = '';
            rows.forEach((row, index) => {
                row.cells[0].innerText = index + 1; // Оновити колонку "№"
                tbody.appendChild(row);
            });
        }



        function clearInputs() {
            document.getElementById('addMoveTitle').value = '';
            document.getElementById('addMoveYear').value = '';
            document.getElementById('addMoveNick').value = '';
        }

        function clearSearch() {
            const searchResultsSection = document.getElementById('search-results-section');
            const isVisible = searchResultsSection.style.display === 'block';

            document.getElementById('search').value = '';
            searchMovies();
            closeSearchResults();

            if (isVisible) {
                searchResultsSection.style.display = 'none';
            } else {
                showAllMovies();
            }
        }

        function clearTables() {
            watchList = [];
            watchedList = [];
            showWatchList();
            showWatchedList();
            updateIndicator();
            isTableEmpty = true;
        }



        function closeSearchResults() {
            document.getElementById('search-results-section').style.display = 'none';
        }

        function closeAllSections() {
            document.getElementById('watch-list-section').style.display = 'none';
            document.getElementById('watched-list-section').style.display = 'none';
            document.getElementById('search-results-section').style.display = 'none';
        }




        // Відображаємо список "Переглянути"

            const tbody = document.querySelector('#watch-list tbody');
            tbody.innerHTML = '';

            watchList.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><input type="text" value="${item.date}" onchange="editMovie('watchList', ${index}, 'date', this.value)"></td>
                    <td><input type="text" value="${item.movie}" onchange="editMovie('watchList', ${index}, 'movie', this.value)"></td>
                    <td><input type="number" value="${item.year}" onchange="editMovie('watchList', ${index}, 'year', this.value)"></td>
                    <td><input type="text" value="${item.nick}" onchange="editMovie('watchList', ${index}, 'nick', this.value)"></td>
                    <td><input type="text" value="${item.genre || ''}" onchange="editMovie('watchList', ${index}, 'genre', this.value)"></td>
                    <td>
                        <button type="button" onclick="markAsWatched(${index})">✅</button>
                        <button type="button" onclick="deleteFromList('watchList', ${index})">❌</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            //const addNewRowButton = document.querySelector('#watch-list .add-new-row');
            //if (!addNewRowButton) {
            //    //const newRowButton = document.createElement('button');
            //    //newRowButton.className = 'add-new-row';
            //    //newRowButton.innerHTML = 'Додати новий рядок';
            //    newRowButton.onclick = () => addNewRow('watchList');
            //    tbody.parentElement.appendChild(newRowButton);
            //}
        }

        // Відображаємо список "Переглянуто"
        function showWatchedList(scroll = true) {

            const tbody = document.querySelector('#watched-list tbody');

        function addNewRow(listName) {
            const newRow = {
                date: new Date().toLocaleDateString(),
                movie: '',
                year: '',
                nick: '',
                genre: '',
                rating: ''
            };

            if (listName === 'watchList') {
                watchList.push(newRow);
                showWatchList();
                scrollToLastRow('watch-list');
            } else if (listName === 'watchedList') {
                watchedList.push(newRow);
                showWatchedList();
                scrollToLastRow('watched-list');
            }

            updateIndicator();
            isTableEmpty = false;
        }



        function showAllMovies() {
            const results = [...watchList, ...watchedList];
            const tbody = document.querySelector('#search-results tbody');
            tbody.innerHTML = '';

            results.forEach((result, index) => {
                const listName = watchList.includes(result) ? 'watchList' : 'watchedList';
                const rowIndex = listName === 'watchList' ? watchList.indexOf(result) : watchedList.indexOf(result);
                const row = document.createElement('tr');
                row.className = listName === 'watchList' ? 'search-result watch-list' : 'search-result watched-list';
                row.innerHTML = `

                                                            <td><input type="text" style="width: 100%; color: ${listName === 'watchList' ? 'red' : 'greenyellow'};" value="${result.movie}" onchange="editMovie('${listName}', ${rowIndex}, 'movie', this.value)"></td>

                                                            <td><input type="number" style="width: 100%; color: ${listName === 'watchList' ? 'red' : 'greenyellow'};" value="${result.rating || ''}" onchange="editMovie('${listName}', ${rowIndex}, 'rating', this.value)"></td>

                                                                <button onclick="deleteFromList('${listName}', ${rowIndex}, true)">❌</button>

                tbody.appendChild(row);
            });

            if (results.length > 0) {
                document.getElementById('search-results-section').style.display = 'block';
            } else {
                document.getElementById('search-results-section').style.display = 'none';
            }
        }



        function updateSearchResults(forceUpdate = true) {
            const query = document.getElementById('search').value.toLowerCase();
            const results = [...watchList, ...watchedList].filter(item => {
                return Object.values(item).some(value =>
                    value && value.toString().toLowerCase().includes(query)
                );
            });

            const tbody = document.querySelector('#search-results tbody');
            tbody.innerHTML = '';

            results.forEach((result, index) => {
                const listName = watchList.includes(result) ? 'watchList' : 'watchedList';
                const rowIndex = listName === 'watchList' ? watchList.indexOf(result) : watchedList.indexOf(result);
                const row = document.createElement('tr');
                row.className = listName === 'watchList' ? 'search-result watch-list' : 'search-result watched-list';
                row.innerHTML = `
                                                            <td>${index + 1}</td>

                                                            <td><input type="text" style="width: 100%; color: ${listName === 'watchList' ? 'red' : 'greenyellow'};" value="${result.movie}" onchange="editMovie('${listName}', ${rowIndex}, 'movie', this.value)"></td>
                                                            <td><input type="number" style="width: 100%; color: ${listName === 'watchList' ? 'red' : 'greenyellow'};" value="${result.year}" onchange="editMovie('${listName}', ${rowIndex}, 'year', this.value)"></td>
                                                            <td><input type="text" style="width: 100%; color: ${listName === 'watchList' ? 'red' : 'greenyellow'};" value="${result.nick || ''}" onchange="editMovie('${listName}', ${rowIndex}, 'nick', this.value)"></td>
                                                            <td><input type="text" style="width: 100%; color: ${listName === 'watchList' ? 'red' : 'greenyellow'};" value="${result.genre || ''}" onchange="editMovie('${listName}', ${rowIndex}, 'genre', this.value)"></td> <!-- Додано -->
                                                            <td><input type="number" style="width: 100%; color: ${listName === 'watchList' ? 'red' : 'greenyellow'};" value="${result.rating || ''}" onchange="editMovie('${listName}', ${rowIndex}, 'rating', this.value)"></td>
                                                            <td>
                                                                ${listName === 'watchList' ? `<button onclick="markAsWatched(${rowIndex}, true)">✅</button>` : ''}
                                                                <button onclick="deleteFromList('${listName}', ${rowIndex}, true)">❌</button>
                                                            </td>
                                                        `;
                tbody.appendChild(row);
            });

            if (forceUpdate) {
                document.getElementById('search-results-section').style.display = results.length > 0 ? 'block' : 'none';
            }
        }
